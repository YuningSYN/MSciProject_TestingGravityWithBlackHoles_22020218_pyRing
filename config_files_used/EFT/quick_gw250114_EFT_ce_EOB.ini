[input]

run-type=full
pesummary=0
screen-output=1
output=/media/yuning/新加卷/Downloads/pyring/outputs/gw250114_EFT_ce_quick_example-6.4
data-H1=data/Real_data/GW250114/H-H1_GWOSC_O4b3Disc_4KHZ_R1-1420878125-32.txt
data-L1=data/Real_data/GW250114/L-L1_GWOSC_O4b3Disc_4KHZ_R1-1420878125-32.txt
trigtime=1420878141.22
detectors=H1,L1
sky-frame=equatorial
#Syntax: [(s,l,m,n)]
kerr-modes=[(2,2,2,0), (2,2,2,1)]
#reference-amplitude=1E-21
amp-non-prec-sym=1
domega-tgr-modes=[(2,2,0), (2,2,1)]
dtau-tgr-modes=[(2,2,0), (2,2,1)]
ParSpec=1
ParSpec_Dmax_TGR=2
ParSpec_Dmax_charge=4
EFT=cubic_even


[Sampler settings]

nlive=256
maxmcmc=256
seed=1234

[Priors]

#from 2509.08054 pp.28&29
mf-time-prior=68.4
#Start at the peaktime
fix-t=0.0
#fix-ra=1.1579
#fix-dec=-1.1911
fix-ra=2.333
fix-dec=0.190
fix-psi=1.329
#Phase degenerate with modes phases
fix-phi=0.0
#Reabsorb inclination in amplitude, speeds up the sampling
#fix-cosiota=-0.9
fix-cosiota=-0.7
#cos(viewing_angle) = cos(0.78) = 0.71,  no, should be inclination-angle
#Restrict Mf(68.1)-af(0.68) values to IMR measurements, since we are in the perturbative regime.
#63 72 60 73
Mf-min=66.5
Mf-max=69.1
af-min=0.66
af-max=0.69
A2220-min=0.0
A2220-max=15.0
A2221-min=0.0
A2221-max=30.0

[Injection]

[Plot]

imr-samples=data/Real_data/GW250114/GW250114_EOB_Mf_af_samples.txt
